<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VM Manager 2026 – Spillerdata · Holdet.dk</title>
<style>
  :root{
    --bg:#eef1f4; --panel:#ffffff; --ink:#16202b; --muted:#5d6b7a; --line:#e2e7ec;
    --brand:#0a7d3c; --brand-d:#055f2c; --brand-l:#e8f5ec; --accent:#0b6bcb;
    --warn:#c0392b; --warn-bg:#fdecea; --ok:#0a7d3c;
    --radius:12px; --shadow:0 1px 2px rgba(16,32,43,.06),0 8px 24px rgba(16,32,43,.06);
    --row:#ffffff; --row-alt:#f7f9fb; --hover:#eef6f0;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}

  /* Header */
  header{background:linear-gradient(135deg,var(--brand-d),var(--brand));color:#fff;padding:22px 20px 18px}
  .wrap{max-width:1280px;margin:0 auto;padding:0 16px}
  .brand{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .logo{width:38px;height:38px;border-radius:9px;background:rgba(255,255,255,.16);display:grid;place-items:center;font-weight:800;font-size:18px;letter-spacing:-1px}
  h1{font-size:20px;margin:0;font-weight:800;letter-spacing:-.3px}
  .sub{margin:4px 0 0;color:rgba(255,255,255,.82);font-size:13px}
  .pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  .pill{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);padding:5px 11px;border-radius:999px;font-size:12.5px;font-weight:600}
  .pill b{font-weight:800}

  /* Toolbar */
  main{max-width:1280px;margin:18px auto 40px;padding:0 16px}
  .toolbar{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;display:grid;gap:12px}
  .controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;align-items:end}
  .field{display:flex;flex-direction:column;gap:5px;min-width:0}
  .field label{font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .field.search{grid-column:1/-1}
  input[type=text],input[type=number],select{
    width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);
    font-size:14px;font-family:var(--sans);transition:border-color .15s,box-shadow .15s}
  input:focus,select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-l)}
  .search-box{position:relative}
  .search-box input{padding-left:36px}
  .search-box svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.45}
  .price-range{display:flex;align-items:center;gap:7px}
  .price-range input{padding:9px 8px}
  .price-range span{color:var(--muted);font-size:12px}

  .actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
  .actions .left{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .count{font-size:13.5px;color:var(--muted)}
  .count b{color:var(--ink);font-weight:800}
  button{font-family:var(--sans);cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--ink);
    padding:9px 14px;border-radius:9px;font-size:13.5px;font-weight:700;transition:.15s}
  button:hover{border-color:#c7cfd7;background:#fbfcfd}
  button:focus-visible{outline:none;box-shadow:0 0 0 3px var(--brand-l);border-color:var(--brand)}
  button.primary{background:var(--brand);border-color:var(--brand);color:#fff}
  button.primary:hover{background:var(--brand-d);border-color:var(--brand-d)}
  button.ghost{background:transparent}

  /* Table */
  .tablecard{margin-top:14px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .scroll{overflow:auto;max-height:72vh}
  table{border-collapse:separate;border-spacing:0;width:100%;font-variant-numeric:tabular-nums}
  thead th{position:sticky;top:0;z-index:2;background:#f3f6f8;color:var(--ink);text-align:left;
    font-size:12px;font-weight:800;letter-spacing:.2px;padding:11px 12px;border-bottom:2px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none}
  thead th.num{text-align:right}
  thead th .th{display:inline-flex;align-items:center;gap:5px}
  thead th.num .th{flex-direction:row-reverse}
  .sortcue{font-size:10px;opacity:.35;transition:.15s}
  th[aria-sort="ascending"] .sortcue,th[aria-sort="descending"] .sortcue{opacity:1;color:var(--brand)}
  th[aria-sort] .th{color:var(--brand-d)}
  tbody td{padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
  tbody td.num{text-align:right;font-variant-numeric:tabular-nums}
  tbody tr:nth-child(even){background:var(--row-alt)}
  tbody tr:hover{background:var(--hover)}
  td.name{font-weight:700}
  td.muted{color:var(--muted)}
  .chip{display:inline-block;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:700;border:1px solid transparent}
  .pos-Keeper{background:#fff3d6;color:#8a5a00}
  .pos-Forsvar{background:#e1f0ff;color:#0b4f8a}
  .pos-Midtbane{background:#e6f6ea;color:#0a6a34}
  .pos-Angreb{background:#ffe6e6;color:#a32020}
  .out-ja{color:var(--warn);font-weight:700}
  .out-nej{color:var(--muted)}
  .up{color:var(--ok);font-weight:700}
  .down{color:var(--warn);font-weight:700}
  .flat{color:var(--muted)}
  .bar{display:inline-block;height:7px;border-radius:4px;background:var(--brand);vertical-align:middle;margin-left:8px;min-width:2px}
  .fix{display:inline-block;padding:2px 8px;border-radius:6px;font-size:12.5px;font-weight:700;white-space:nowrap}
  .fix .fxd{font-weight:500;opacity:.7;font-size:11.5px;margin-left:4px}
  .fdr-5{background:#f6cfcb;color:#7d1a13}
  .fdr-4{background:#f7ddc0;color:#7c4a12}
  .fdr-3{background:#f3ecbe;color:#6a5c0e}
  .fdr-2{background:#dcefcb;color:#356323}
  .fdr-1{background:#c3e6bb;color:#1c5e1c}
  .legend{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12.5px}
  .legend .lgl{color:var(--muted);font-weight:700;margin-right:2px}
  .legend .fix{min-width:26px;text-align:center}
  .empty{padding:48px 20px;text-align:center;color:var(--muted)}

  /* Pagination */
  .pager{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;flex-wrap:wrap;border-top:1px solid var(--line);background:#fafcfd}
  .pager .pages{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
  .pager button{padding:7px 11px;min-width:38px}
  .pager button.active{background:var(--brand);border-color:var(--brand);color:#fff}
  .pager .perpage{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px}
  .pager select{width:auto;padding:7px 9px}

  footer{max-width:1280px;margin:0 auto 40px;padding:0 16px;color:var(--muted);font-size:12.5px}
  .nodata{padding:60px 20px;text-align:center;color:var(--warn)}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(16,32,43,.55);display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;z-index:50;overflow:auto}
  .modal-overlay[hidden]{display:none}
  .modal{background:var(--panel);border-radius:14px;box-shadow:0 24px 60px rgba(0,0,0,.32);width:100%;max-width:780px;margin:auto;overflow:hidden}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid var(--line)}
  .modal-head h2{margin:0;font-size:18px;font-weight:800}
  .icon-btn{border:none;background:transparent;font-size:17px;line-height:1;color:var(--muted);padding:6px 9px;border-radius:8px;cursor:pointer}
  .icon-btn:hover{background:#eef1f4;color:var(--ink)}
  .modal-body{padding:18px 20px}
  .modal-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;padding-top:14px;border-top:1px solid var(--line)}
  /* Column chooser */
  .ck-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px 18px}
  .ck{display:flex;align-items:center;gap:9px;font-size:14px;cursor:pointer;padding:4px 0}
  .ck input{width:16px;height:16px;accent-color:var(--brand);cursor:pointer}
  .ck input:disabled{cursor:default;opacity:.6}
  /* TOTR pitch */
  .totr-meta{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px;font-size:13px;color:var(--muted)}
  .totr-meta b{color:var(--ink);font-weight:800}
  .pitch{background:#1c9a55;background-image:repeating-linear-gradient(90deg,rgba(255,255,255,.06) 0 44px,transparent 44px 88px);border:2px solid #15803d;border-radius:14px;padding:18px 10px;display:flex;flex-direction:column;gap:16px}
  .pitch-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
  .pp{background:#fff;border-radius:10px;padding:7px 9px;min-width:108px;max-width:130px;text-align:center;box-shadow:0 2px 7px rgba(0,0,0,.2)}
  .pp .pos-tag{display:inline-block;font-size:10px;font-weight:700;color:#fff;background:rgba(0,0,0,.28);border-radius:4px;padding:1px 6px;margin-bottom:3px}
  .pp .nm{font-weight:800;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pp .lc{font-size:11px;color:var(--muted);margin:1px 0 3px}
  .pp .gr{font-size:13px;font-weight:800;color:var(--ok)}
  @media(max-width:640px){
    h1{font-size:17px}.scroll{max-height:64vh}
    thead th,tbody td{padding:8px 10px}
  }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="brand">
      <div class="logo">H</div>
      <div>
        <h1>VM Manager 2026 — Spillerdata</h1>
        <p class="sub" id="subline">Interaktivt datasæt · Kilde: Holdet.dk</p>
      </div>
    </div>
    <div class="pills" id="pills"></div>
  </div>
</header>

<main>
  <div class="toolbar">
    <div class="controls">
      <div class="field search">
        <label for="q">Søg spiller</label>
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input type="text" id="q" placeholder="Navn eller land…" autocomplete="off">
        </div>
      </div>
      <div class="field">
        <label for="f-pos">Position</label>
        <select id="f-pos"><option value="">Alle positioner</option></select>
      </div>
      <div class="field">
        <label for="f-land">Land</label>
        <select id="f-land"><option value="">Alle lande</option></select>
      </div>
      <div class="field">
        <label for="f-out">Ude af spil</label>
        <select id="f-out"><option value="">Alle</option><option value="Nej">Kun spilbare</option><option value="Ja">Kun ude af spil</option></select>
      </div>
      <div class="field">
        <label>Pris (€)</label>
        <div class="price-range">
          <input type="number" id="f-pmin" placeholder="min" step="500000" aria-label="Minimumspris">
          <span>–</span>
          <input type="number" id="f-pmax" placeholder="max" step="500000" aria-label="Maksimumspris">
        </div>
      </div>
    </div>
    <div class="actions">
      <div class="left">
        <span class="count" id="count"></span>
      </div>
      <div class="left">
        <button class="ghost" id="totr-btn">⚽ Team of the Round</button>
        <button class="ghost" id="cols-btn">Kolonner</button>
        <button class="ghost" id="reset">Nulstil filtre</button>
        <button class="primary" id="export">Eksportér CSV</button>
      </div>
    </div>
    <div class="legend" aria-label="Forklaring: modstandersværhedsgrad i runde 1-3">
      <span class="lgl">Modstander-sværhedsgrad (Runde 1-3):</span>
      <span class="fix fdr-5">Svær</span>
      <span class="fix fdr-4">&nbsp;</span>
      <span class="fix fdr-3">Middel</span>
      <span class="fix fdr-2">&nbsp;</span>
      <span class="fix fdr-1">Let</span>
    </div>
  </div>

  <div class="tablecard">
    <div class="scroll">
      <table id="tbl">
        <thead><tr id="head"></tr></thead>
        <tbody id="body"></tbody>
      </table>
    </div>
    <div class="pager">
      <div class="perpage">
        Rækker pr. side:
        <select id="perpage" aria-label="Rækker pr. side">
          <option value="25">25</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
          <option value="99999">Alle</option>
        </select>
      </div>
      <div class="pages" id="pages"></div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modal" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-head">
      <h2 id="modal-title"></h2>
      <button class="icon-btn" id="modal-close" aria-label="Luk">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<footer>
  <p id="foot">Interaktivt datasæt genereret fra <code>spillere_world_manager_2026.xlsx</code>. Alle tal stammer fra Holdet.dk · VM Manager 2026.</p>
</footer>

<script>
(function(){
  "use strict";
  const root = DATASET || {};
  const COLS = root.columns || [];
  const ROWS = root.rows || [];
  const $ = (id)=>document.getElementById(id);

  if(!COLS.length || !ROWS.length){
    document.querySelector("main").innerHTML =
      '<div class="tablecard"><div class="nodata">Kunne ikke indlæse data. Tjek at datasættet er indlejret korrekt.</div></div>';
    return;
  }

  const nf = new Intl.NumberFormat("da-DK");
  const nf1 = new Intl.NumberFormat("da-DK",{minimumFractionDigits:1,maximumFractionDigits:2});
  const NUMERIC = new Set(["int","float","money","pct","delta"]);

  // ---- Derived meta for header pills ----
  const distinct = (k)=>{const s=new Set();for(const r of ROWS){const v=r[k];if(v!==null&&v!==""&&v!==undefined)s.add(v);}return [...s];};
  const nLande = distinct("Land").length;

  // ---- Opponent difficulty (from each nation's seeding "Rang", 1=best..48=worst) ----
  const rangByLand={};
  ROWS.forEach(r=>{ if(r.Land!=null && r.Rang!=null) rangByLand[r.Land]=r.Rang; });
  const FIX_LABEL={5:"meget svær",4:"svær",3:"middel",2:"let",1:"meget let"};
  function fixTier(rg){ if(rg==null) return 0; if(rg<=10) return 5; if(rg<=20) return 4; if(rg<=30) return 3; if(rg<=40) return 2; return 1; }
  function renderFixture(v){
    if(v===null||v===undefined||v==="") return '<span class="muted">–</span>';
    const m=String(v).match(/^(.+?)\s+(\d{1,2}\/\d{1,2})$/);
    const opp=m?m[1].trim():String(v).trim();
    const date=m?m[2]:"";
    const rg=rangByLand[opp]; const t=fixTier(rg);
    const tip=t?`${opp} · seedning ${rg} · ${FIX_LABEL[t]}`:opp;
    return `<span class="fix${t?(' fdr-'+t):''}" title="${escapeHtml(tip)}">${escapeHtml(opp)}${date?`<span class="fxd">${escapeHtml(date)}</span>`:""}</span>`;
  }
  const maxVaekst = ROWS.reduce((m,r)=>Math.max(m, r["Vækst"]||0),0);
  const maxVI = ROWS.reduce((m,r)=>Math.max(m, r["Værdi-indeks"]||0),0);
  $("subline").textContent = "Interaktivt datasæt · Kilde: Holdet.dk · Opdateret 2026-06-18 00:12";
  $("pills").innerHTML = [
    ['Spillere', nf.format(ROWS.length)],
    ['Største stigning', '+€'+nf.format(maxVaekst)],
    ['Bedste værdi-indeks', nf1.format(maxVI)],
    ['Nationer', nf.format(nLande)],
  ].map(([a,b])=>`<span class="pill">${a}: <b>${b}</b></span>`).join("");

  // ---- Populate select filters ----
  function fillSelect(id,key,sortNum){
    const sel=$(id);
    let vals=distinct(key);
    vals.sort(sortNum?((a,b)=>a-b):((a,b)=>(""+a).localeCompare(""+b,"da")));
    for(const v of vals){const o=document.createElement("option");o.value=v;o.textContent=v;sel.appendChild(o);}
  }
  fillSelect("f-pos","Position");
  fillSelect("f-land","Land");

  // ---- State ----
  // ---- Column visibility (persisted) ----
  const VKEY="holdet_visible_v1";
  const ALL_KEYS=COLS.map(c=>c.key);
  const MINIMAL=["Navn","Position","Pris","Vækst","Værdi-indeks","Popularitet"];
  function loadVisible(){
    try{ const s=JSON.parse(localStorage.getItem(VKEY)); if(Array.isArray(s)){ const set=new Set(s.filter(k=>ALL_KEYS.includes(k))); set.add("Navn"); if(set.size>1) return set; } }catch(e){}
    return new Set(ALL_KEYS);
  }
  function saveVisible(){ try{ localStorage.setItem(VKEY, JSON.stringify([...state.visible])); }catch(e){} }
  function visibleCols(){ return COLS.filter(c=>state.visible.has(c.key)); }

  const state = { q:"", pos:"", land:"", out:"", pmin:null, pmax:null,
                  sortKey:"Vækst", sortDir:-1, page:1, perPage:50, visible:loadVisible() };

  // ---- Formatting per column type ----
  function fmt(col,val){
    if(val===null||val===undefined||val==="") return '<span class="muted">–</span>';
    switch(col.type){
      case "money": return nf.format(val);
      case "int":   return nf.format(val);
      case "float": return nf1.format(val);
      case "pct":   return nf1.format(val*100)+" %";
      case "delta": { const s=val>0?"+":(val<0?"−":""); return s+nf.format(Math.abs(val)); }
      default:      return escapeHtml(String(val));
    }
  }
  function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

  function cellClass(col){return NUMERIC.has(col.type)?"num":"";}

  // Special render for some columns (chips etc.)
  function renderCell(col,r){
    const v=r[col.key];
    if(col.key==="Position" && v) return `<span class="chip pos-${v}">${escapeHtml(v)}</span>`;
    if(col.key==="Ude af spil") return `<span class="${v==='Ja'?'out-ja':'out-nej'}">${escapeHtml(v||'–')}</span>`;
    if(col.key==="Vækst"){
      if(v===null||v===undefined) return '<span class="muted">–</span>';
      const cls=v>0?"up":(v<0?"down":"flat"); const s=v>0?"+":(v<0?"−":"");
      return `<span class="${cls}">${s}${nf.format(Math.abs(v))}</span>`;
    }
    if(col.key==="Popularitet" && typeof v==="number"){
      const w=Math.max(2,Math.round(v/0.35*60));
      return `${nf1.format(v*100)} %<span class="bar" style="width:${w}px"></span>`;
    }
    if(col.key==="Runde 1"||col.key==="Runde 2"||col.key==="Runde 3") return renderFixture(v);
    if(col.key==="Program R1-3" && typeof v==="number"){
      const c=v<=1.66?"fdr-5":(v<=2.33?"fdr-3":"fdr-1");
      return `<span class="fix ${c}" title="Samlet sværhedsgrad runde 1-3 (1=svær … 3=let)">${nf1.format(v)}</span>`;
    }
    return fmt(col,v);
  }

  // ---- Build header (respects column visibility) ----
  const head=$("head");
  function buildHeader(){
    head.innerHTML="";
    visibleCols().forEach(col=>{
      const th=document.createElement("th");
      const isNum=NUMERIC.has(col.type);
      if(isNum) th.className="num";
      th.dataset.key=col.key;
      th.innerHTML=`<span class="th">${escapeHtml(col.label)}<span class="sortcue">▲▼</span></span>`;
      th.setAttribute("scope","col");
      th.setAttribute("title",(col.hint? col.hint+" · " : "")+"Klik for at sortere");
      th.addEventListener("click",()=>{
        if(state.sortKey===col.key){ state.sortDir*=-1; }
        else { state.sortKey=col.key; state.sortDir = isNum?-1:1; }
        state.page=1; render();
      });
      head.appendChild(th);
    });
  }

  // ---- Filtering + sorting pipeline ----
  function getFiltered(){
    const q=state.q.trim().toLowerCase();
    return ROWS.filter(r=>{
      if(q && !(String(r["Navn"]).toLowerCase().includes(q) || String(r["Land"]).toLowerCase().includes(q))) return false;
      if(state.pos && r["Position"]!==state.pos) return false;
      if(state.land && r["Land"]!==state.land) return false;
      if(state.out && r["Ude af spil"]!==state.out) return false;
      if(state.pmin!=null && (r["Pris"]==null || r["Pris"]<state.pmin)) return false;
      if(state.pmax!=null && (r["Pris"]==null || r["Pris"]>state.pmax)) return false;
      return true;
    });
  }
  function sortRows(rows){
    const col=COLS.find(c=>c.key===state.sortKey);
    const num=col&&NUMERIC.has(col.type);
    const k=state.sortKey, dir=state.sortDir;
    return rows.slice().sort((a,b)=>{
      let x=a[k], y=b[k];
      const xe=(x===null||x===undefined||x===""), ye=(y===null||y===undefined||y==="");
      if(xe&&ye) return 0; if(xe) return 1; if(ye) return -1;   // empties always last
      if(num) return (x-y)*dir;
      return String(x).localeCompare(String(y),"da")*dir;
    });
  }

  // ---- Render ----
  let current=[]; // filtered+sorted (full set, for export)
  function render(){
    current = sortRows(getFiltered());
    const total=current.length;
    const per=state.perPage;
    const pages=Math.max(1,Math.ceil(total/per));
    if(state.page>pages) state.page=pages;
    const start=(state.page-1)*per;
    const slice=current.slice(start, start+per);

    // header aria-sort
    [...head.children].forEach(th=>{
      if(th.dataset.key===state.sortKey) th.setAttribute("aria-sort",state.sortDir===1?"ascending":"descending");
      else th.removeAttribute("aria-sort");
    });

    // body
    const body=$("body");
    if(!slice.length){
      body.innerHTML=`<tr><td colspan="${visibleCols().length}"><div class="empty">Ingen spillere matcher dine filtre.</div></td></tr>`;
    } else {
      const cols=visibleCols();
      const rowsHtml=slice.map(r=>{
        const tds=cols.map(col=>{
          const cls=cellClass(col)+(col.key==="Navn"?" name":"");
          return `<td class="${cls}">${renderCell(col,r)}</td>`;
        }).join("");
        return `<tr>${tds}</tr>`;
      }).join("");
      body.innerHTML=rowsHtml;
    }

    // count
    const shown = slice.length ? `${nf.format(start+1)}–${nf.format(start+slice.length)}` : "0";
    $("count").innerHTML = `Viser <b>${shown}</b> af <b>${nf.format(total)}</b> spillere`;

    renderPager(pages);
  }

  function renderPager(pages){
    const box=$("pages"); box.innerHTML="";
    const cur=state.page;
    const mk=(label,page,opts={})=>{
      const b=document.createElement("button");
      b.textContent=label;
      if(opts.active){ b.classList.add("active"); b.setAttribute("aria-current","page"); }
      if(opts.disabled){b.disabled=true;b.style.opacity=.4;b.style.cursor="default";}
      if(opts.aria) b.setAttribute("aria-label",opts.aria);
      b.addEventListener("click",()=>{state.page=page;render();const sc=document.querySelector(".scroll");if(sc)sc.scrollTop=0;});
      return b;
    };
    box.appendChild(mk("‹",cur-1,{disabled:cur<=1,aria:"Forrige side"}));
    const win=[];
    const add=(p)=>{if(p>=1&&p<=pages&&!win.includes(p))win.push(p);};
    add(1);add(2);add(pages-1);add(pages);
    for(let p=cur-1;p<=cur+1;p++)add(p);
    win.sort((a,b)=>a-b);
    let prev=0;
    win.forEach(p=>{
      if(prev && p-prev>1){const s=document.createElement("span");s.textContent="…";s.style.padding="0 4px";s.style.color="var(--muted)";box.appendChild(s);}
      box.appendChild(mk(String(p),p,{active:p===cur}));
      prev=p;
    });
    box.appendChild(mk("›",cur+1,{disabled:cur>=pages,aria:"Næste side"}));
  }

  // ---- CSV export (current filtered+sorted set) ----
  function exportCSV(){
    const sep=";";
    const cols=visibleCols();
    const header=cols.map(c=>c.label).join(sep);
    const lines=current.map(r=>cols.map(c=>{
      let v=r[c.key];
      if(v===null||v===undefined) v="";
      let s=String(v);
      if(s.includes(sep)||s.includes('"')||s.includes("\n")) s='"'+s.replace(/"/g,'""')+'"';
      return s;
    }).join(sep));
    const csv="﻿"+header+"\r\n"+lines.join("\r\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="holdet_vm_manager_2026_filtreret.csv";
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),1500);
  }

  // ---- Modal (generic popup) ----
  const modal=$("modal"), modalBody=$("modal-body"), modalTitle=$("modal-title");
  function openModal(title){ modalTitle.textContent=title; modal.hidden=false; document.body.style.overflow="hidden"; $("modal-close").focus(); }
  function closeModal(){ modal.hidden=true; document.body.style.overflow=""; }
  $("modal-close").addEventListener("click",closeModal);
  modal.addEventListener("click",e=>{ if(e.target===modal) closeModal(); });
  document.addEventListener("keydown",e=>{ if(e.key==="Escape"&&!modal.hidden) closeModal(); });

  // ---- Team of the Round (3-4-3, størst vækst, spilbare spillere) ----
  function pickTOTR(){
    const avail=ROWS.filter(r=>r["Ude af spil"]!=="Ja" && typeof r["Vækst"]==="number");
    const top=(posDa,n)=>avail.filter(r=>r.Position===posDa).sort((a,b)=>b["Vækst"]-a["Vækst"]).slice(0,n);
    return [
      {players:top("Angreb",3)},
      {players:top("Midtbane",4)},
      {players:top("Forsvar",3)},
      {players:top("Keeper",1)},
    ];
  }
  function totrCard(p){
    return `<div class="pp"><div class="pos-tag">${escapeHtml(p.Position||"")}</div>`+
      `<div class="nm" title="${escapeHtml(p.Navn)}">${escapeHtml(p.Navn)}</div>`+
      `<div class="lc">${escapeHtml(p.Land||"")} · €${nf.format(p.Pris||0)}</div>`+
      `<div class="gr">+€${nf.format(p["Vækst"]||0)}</div></div>`;
  }
  function openTOTR(){
    const rowsT=pickTOTR();
    const all=rowsT.flatMap(r=>r.players);
    const sum=all.reduce((s,p)=>s+(p["Vækst"]||0),0);
    const pitch=rowsT.map(r=>`<div class="pitch-row">${r.players.map(totrCard).join("")}</div>`).join("");
    modalBody.innerHTML=
      `<div class="totr-meta"><span>Formation <b>3-4-3</b></span><span>Spillere <b>${all.length}</b></span>`+
      `<span>Samlet vækst <b>+€${nf.format(sum)}</b></span></div>`+
      `<div class="pitch">${pitch}</div>`+
      `<p style="margin:12px 0 0;font-size:12px;color:var(--muted)">Spillerne med størst prisstigning (Vækst) pr. position. "Ude af spil" er udeladt.</p>`;
    openModal("⚽ Team of the Round");
  }

  // ---- Column chooser ----
  function openCols(){
    modalBody.innerHTML=
      `<div class="ck-grid">`+COLS.map(c=>
        `<label class="ck"><input type="checkbox" data-k="${escapeHtml(c.key)}" ${state.visible.has(c.key)?"checked":""} ${c.key==="Navn"?"disabled":""}>${escapeHtml(c.label)}</label>`
      ).join("")+`</div>`+
      `<div class="modal-actions"><button id="ck-all">Vis alle</button><button id="ck-min">Kun nøgletal</button></div>`;
    modalBody.querySelectorAll("input[type=checkbox]").forEach(cb=>cb.addEventListener("change",()=>{
      if(cb.checked) state.visible.add(cb.dataset.k); else state.visible.delete(cb.dataset.k);
      state.visible.add("Navn"); saveVisible(); buildHeader(); render();
    }));
    const apply=keys=>{ state.visible=new Set(keys); state.visible.add("Navn"); saveVisible(); buildHeader(); render(); openCols(); };
    $("ck-all").addEventListener("click",()=>apply(ALL_KEYS));
    $("ck-min").addEventListener("click",()=>apply(MINIMAL));
    openModal("Vælg kolonner");
  }

  $("totr-btn").addEventListener("click",openTOTR);
  $("cols-btn").addEventListener("click",openCols);

  // ---- Events ----
  let t=null;
  $("q").addEventListener("input",e=>{clearTimeout(t);t=setTimeout(()=>{state.q=e.target.value;state.page=1;render();},180);});
  $("f-pos").addEventListener("change",e=>{state.pos=e.target.value;state.page=1;render();});
  $("f-land").addEventListener("change",e=>{state.land=e.target.value;state.page=1;render();});
  $("f-out").addEventListener("change",e=>{state.out=e.target.value;state.page=1;render();});
  $("f-pmin").addEventListener("input",e=>{state.pmin=e.target.value===""?null:+e.target.value;state.page=1;render();});
  $("f-pmax").addEventListener("input",e=>{state.pmax=e.target.value===""?null:+e.target.value;state.page=1;render();});
  $("perpage").addEventListener("change",e=>{state.perPage=+e.target.value;state.page=1;render();});
  $("export").addEventListener("click",exportCSV);
  $("reset").addEventListener("click",()=>{
    state.q="";state.pos="";state.land="";state.out="";state.pmin=null;state.pmax=null;state.page=1;
    $("q").value="";$("f-pos").value="";$("f-land").value="";$("f-out").value="";$("f-pmin").value="";$("f-pmax").value="";
    render();
  });

  buildHeader();
  render();
})();
</script>
</body>
</html>
